version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      time: "00:05"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - ssbingo
    versioning-strategy: increase
    # reduce supply-chain risk: wait a few days before opening update PRs
    cooldown:
      default-days: 7
    ignore:
      # do not bump @types/node across major versions (tied to the Node engine)
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "00:05"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - ssbingo
    cooldown:
      default-days: 7
